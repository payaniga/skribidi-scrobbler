<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YTM Cookie Refresher</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>YTM Cookie Refresher</h1>

  <div class="row">
    <span class="label">Last refresh</span>
    <span id="lastRefresh" class="value">—</span>
  </div>
  <div class="row">
    <span class="label">Status</span>
    <span id="statusText" class="value">—</span>
  </div>
  <div class="row">
    <span class="label">Next refresh</span>
    <span id="nextRefresh" class="value">—</span>
  </div>

  <div id="errorMsg"></div>

  <div class="actions">
    <button id="refreshBtn">Refresh Now</button>
    <button id="settingsBtn">Settings</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
